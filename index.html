<!-- ==================== LOGIN ==================== -->
<div class="login-screen" id="loginScreen">
  <div class="login-bg"></div>
  <canvas id="loginFwCanvas" style="position:absolute;inset:0;z-index:1;opacity:0.55"></canvas>
  <canvas id="mouseTrail" style="position:absolute;inset:0;z-index:1;pointer-events:none"></canvas>
  <div class="login-landing" id="loginLanding">
    <div class="landing-buttons">
      <button class="landing-btn" onclick="showLoginForm('login')">登录</button>
      <button class="landing-btn" onclick="showLoginForm('register')">注册</button>
    </div>
  </div>
  <div class="login-form-panel" id="loginFormPanel">
    <span class="back-link" onclick="hideLoginForm()">← 返回</span>
    <div class="form-card">
      <h2 id="formTitle">登录</h2>
      <form id="authForm" autocomplete="off">
        <div class="field"><label>用户名</label><input type="text" id="authUser" placeholder="输入用户名" autocomplete="off"></div>
        <div class="field"><label>密码</label><input type="password" id="authPass" placeholder="输入密码" autocomplete="off"></div>
        <div class="field" id="confirmField" style="display:none"><label>确认密码</label><input type="password" id="authConfirm" placeholder="再次输入密码" autocomplete="off"></div>
        <button type="submit" class="btn" id="authSubmit">登 录</button>
      </form>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
  <div class="login-Upfooter">
    <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" style="color:rgba(255, 255, 255, 0.18);text-decoration:none">浙ICP备2026050961号</a>
  </div>
  <div class="login-footer">ZERONI01</div>
</div>

<!-- ==================== APP ==================== -->
<div class="app-shell" id="appShell">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <div class="app-inner">
    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="logo-dot"><svg viewBox="0 0 24 24"><use href="#i-firework-logo"/></svg></div>
        <span>BWZ工具站</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-foot">
        <div class="avatar" id="sbAvatar">?</div>
        <span class="uname" id="sbUser">--</span>
        <button class="logout-btn" title="退出" onclick="logout()"><svg viewBox="0 0 24 24"><use href="#i-logout"/></svg></button>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()" title="折叠侧边栏"><span></span></button>
        <div class="breadcrumb" id="breadcrumb"><span class="current">首页</span></div>
      </header>
      <div class="content" id="pageContent"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-mask" id="modalMask"><div class="modal-box" id="modalBox"></div></div>
<div class="toast-ctn" id="toastCtn"></div>

<!-- ==================== JS 模块 ==================== -->
<script src="js/api.js"></script>
